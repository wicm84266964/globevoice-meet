name: Feature request
description: Propose a GlobeVoice Meet workflow improvement
title: "[Feature]: "
body:
  - type: input
    id: workflow
    attributes:
      label: Meeting workflow
      description: Which capture, translation, playback, or setup task would this improve?
      placeholder: "For example: audio device setup or live subtitle review"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the current limitation without including real meeting content.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I searched existing issues for a similar request.
          required: true
        - label: This request contains no credentials, meeting content, participant details, or personal information.
          required: true
